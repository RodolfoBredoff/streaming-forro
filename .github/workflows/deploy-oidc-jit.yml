name: Deploy (OIDC + JIT)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # ── Empacota o código e envia para o S3 ──────────────────────────────────
    - name: Upload Code to S3
      env:
        S3_BUCKET: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
      run: |
        tar czf /tmp/app_deploy.tar.gz \
          --exclude='./.git' \
          --exclude='./venv' \
          --exclude='./.env' \
          --exclude='./db.sqlite3' \
          --exclude='./db.sqlite3.bak_*' \
          --exclude='./__pycache__' \
          --exclude='./*.pyc' \
          --exclude='./staticfiles' \
          .
        aws s3 cp /tmp/app_deploy.tar.gz \
          "s3://${S3_BUCKET}/deploy/app_deploy.tar.gz" --no-progress
        echo "✅ Código enviado para s3://${S3_BUCKET}/deploy/"

    # ── Executa o deploy no servidor via SSM (sem SSH, sem chave) ────────────
    # O servidor baixa o código do S3 usando o próprio role IAM da instância.
    - name: Deploy via SSM
      env:
        S3_BUCKET: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
        APP_DIR: ${{ secrets.APP_DIR }}
      run: |
        jq -n \
          --arg bucket "$S3_BUCKET" \
          --arg dir    "$APP_DIR" \
        '{commands: [
          ("aws s3 cp s3://" + $bucket + "/deploy/app_deploy.tar.gz /tmp/app_deploy.tar.gz"),
          ("mkdir -p " + $dir + " && tar xzf /tmp/app_deploy.tar.gz -C " + $dir + " && rm -f /tmp/app_deploy.tar.gz"),
          ($dir + "/venv/bin/pip install -r " + $dir + "/requirements.txt --quiet"),
          ("cd " + $dir + " && cp db.sqlite3 db.sqlite3.bak_$(date +%Y%m%d_%H%M%S) 2>/dev/null || true && ls -t db.sqlite3.bak_* 2>/dev/null | tail -n +6 | xargs rm -f || true"),
          ($dir + "/venv/bin/python " + $dir + "/manage.py migrate --noinput"),
          "systemctl restart gunicorn",
          "sleep 2 && systemctl is-active --quiet gunicorn && echo OK || exit 1"
        ]}' > /tmp/ssm_params.json

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Streaming Flix Deploy" \
          --parameters file:///tmp/ssm_params.json \
          --query "Command.CommandId" \
          --output text)

        echo "SSM Command ID: $COMMAND_ID"
        echo "⏳ Aguardando execução..."

        for i in $(seq 1 30); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StatusDetails" --output text 2>/dev/null || echo "Pending")
          echo "  [$i/30] $STATUS"
          if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || \
                "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
            break
          fi
          sleep 10
        done

        RESULT=$(aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}")

        echo ""
        echo "════ OUTPUT DO SERVIDOR ════"
        echo "$RESULT" | jq -r '.StandardOutputContent'

        STDERR=$(echo "$RESULT" | jq -r '.StandardErrorContent')
        if [ -n "$STDERR" ] && [ "$STDERR" != "null" ] && [ "$STDERR" != "" ]; then
          echo "════ STDERR ════"
          echo "$STDERR"
        fi

        FINAL_STATUS=$(echo "$RESULT" | jq -r '.StatusDetails')
        if [ "$FINAL_STATUS" != "Success" ]; then
          echo "❌ Deploy falhou: $FINAL_STATUS"
          exit 1
        fi
        echo "✅ Deploy concluído com sucesso!"

    # ── Limpa o artefato do S3 sempre (sucesso ou falha) ─────────────────────
    - name: Cleanup S3
      if: always()
      env:
        S3_BUCKET: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
      run: |
        aws s3 rm "s3://${S3_BUCKET}/deploy/app_deploy.tar.gz" 2>/dev/null || true
