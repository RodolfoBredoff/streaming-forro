name: Deploy (OIDC + JIT)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 🚀 Deploy para EC2
    runs-on: ubuntu-latest

    steps:

    # ── 1. CÓDIGO ────────────────────────────────────────────────────────────
    - name: Checkout Code
      uses: actions/checkout@v4

    # ── 2. IP DO RUNNER (para liberar SSH just-in-time) ──────────────────────
    - name: Get GitHub Runner IP
      id: ip
      run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

    # ── 3. CREDENCIAIS AWS VIA OIDC ──────────────────────────────────────────
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # ── 4. IP DA EC2 ─────────────────────────────────────────────────────────
    - name: Get EC2 Public IP
      run: |
        PUBLIC_IP=$(aws ec2 describe-instances \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --query "Reservations[0].Instances[0].PublicIpAddress" \
          --output text)

        if [ "$PUBLIC_IP" == "None" ] || [ -z "$PUBLIC_IP" ]; then
          echo "❌ Instância desligada ou sem IP público."
          exit 1
        fi

        echo "EC2_HOST=$PUBLIC_IP" >> $GITHUB_ENV
        echo "✅ IP detectado: $PUBLIC_IP"

    # ── 5. ABRIR SSH (JIT) ───────────────────────────────────────────────────
    - name: Open SSH Port
      run: |
        aws ec2 authorize-security-group-ingress \
          --group-id ${{ secrets.AWS_SG_ID }} \
          --protocol tcp --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32

    # ── 6. ENVIAR CÓDIGO VIA RSYNC ───────────────────────────────────────────
    # Rsync envia apenas os arquivos alterados, sem precisar de git na EC2.
    # Arquivos sensíveis (.env, db.sqlite3, venv) são preservados no servidor.
    - name: Sync Code to Server
      env:
        SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        APP_DIR: ${{ secrets.APP_DIR }}
      run: |
        # Validação: APP_DIR é obrigatório e deve ser um caminho absoluto
        if [ -z "$APP_DIR" ]; then
          echo "❌ Secret APP_DIR não está configurado!"
          echo "   Acesse: GitHub → Settings → Secrets → Actions → New secret"
          echo "   Nome: APP_DIR  |  Valor ex: /home/ubuntu/app"
          exit 1
        fi

        if [[ "$APP_DIR" != /* ]]; then
          echo "❌ APP_DIR deve ser um caminho absoluto (começar com /). Valor atual: '$APP_DIR'"
          exit 1
        fi

        echo "📂 Destino: ubuntu@$EC2_HOST:$APP_DIR"

        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

        rsync -az --delete \
          --exclude='venv/' \
          --exclude='.env' \
          --exclude='db.sqlite3' \
          --exclude='db.sqlite3.bak_*' \
          --exclude='*.pyc' \
          --exclude='__pycache__/' \
          --exclude='.git/' \
          --exclude='staticfiles/' \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          ./ "ubuntu@${EC2_HOST}:${APP_DIR}/"

        echo "✅ Código sincronizado para $APP_DIR"

    # ── 7. TAREFAS PÓS-DEPLOY NO SERVIDOR ───────────────────────────────────
    - name: Post-Deploy Tasks
      uses: appleboy/ssh-action@master
      with:
        host: ${{ env.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e

          APP_DIR="${{ secrets.APP_DIR }}"
          VENV="$APP_DIR/venv/bin"

          echo ""
          echo "════════════════════════════════════════"
          echo "  STREAMING FLIX — DEPLOY $(date '+%d/%m/%Y %H:%M:%S')"
          echo "════════════════════════════════════════"

          # ── 1. Dependências Python ───────────────
          echo ""
          echo "📦 [1/4] Instalando dependências..."
          "$VENV/pip" install -r "$APP_DIR/requirements.txt" --quiet

          # ── 2. Backup do banco (SQLite) ──────────
          echo ""
          echo "💾 [2/4] Backup do banco de dados..."
          cd "$APP_DIR"
          BACKUP_FILE="db.sqlite3.bak_$(date '+%Y%m%d_%H%M%S')"
          cp db.sqlite3 "$BACKUP_FILE" 2>/dev/null \
            && echo "✅ Backup: $BACKUP_FILE" \
            || echo "⚠️  Banco não encontrado, pulando backup."
          ls -t db.sqlite3.bak_* 2>/dev/null | tail -n +6 | xargs rm -f || true

          # ── 3. Migrations ────────────────────────
          echo ""
          echo "🗄️  [3/4] Rodando migrations..."
          "$VENV/python" manage.py migrate --noinput

          # ── 4. Reiniciar Gunicorn ────────────────
          echo ""
          echo "🔄 [4/4] Reiniciando Gunicorn..."
          sudo systemctl restart gunicorn
          sleep 2
          systemctl is-active --quiet gunicorn \
            && echo "✅ Gunicorn rodando." \
            || (echo "❌ Gunicorn falhou ao iniciar!" && exit 1)

          echo ""
          echo "════════════════════════════════════════"
          echo "  ✅ DEPLOY CONCLUÍDO COM SUCESSO"
          echo "════════════════════════════════════════"

    # ── 8. HEALTH CHECK ──────────────────────────────────────────────────────
    - name: Health Check
      run: |
        echo "⏳ Aguardando aplicação estabilizar..."
        sleep 5

        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-time 15 --location \
          "http://${{ env.EC2_HOST }}" || echo "000")

        echo "HTTP Response: $HTTP_CODE"

        if [[ "$HTTP_CODE" =~ ^(200|301|302)$ ]]; then
          echo "✅ Aplicação respondendo ($HTTP_CODE)"
        else
          echo "❌ Aplicação não respondeu como esperado (HTTP $HTTP_CODE)"
          exit 1
        fi

    # ── 9. FECHAR SSH (SEMPRE, mesmo em falha) ───────────────────────────────
    - name: Close SSH Port
      if: always()
      run: |
        aws ec2 revoke-security-group-ingress \
          --group-id ${{ secrets.AWS_SG_ID }} \
          --protocol tcp --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32
        echo "🔒 Porta SSH fechada."
