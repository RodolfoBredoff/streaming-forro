name: Deploy (OIDC + JIT)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 🚀 Deploy para EC2
    runs-on: ubuntu-latest

    steps:

    # ── 1. CÓDIGO ────────────────────────────────────────────────────────────
    - name: Checkout Code
      uses: actions/checkout@v4

    # ── 2. CREDENCIAIS AWS VIA OIDC ──────────────────────────────────────────
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # ── 3. IP DA EC2 (apenas para o health check) ────────────────────────────
    - name: Get EC2 Public IP
      run: |
        PUBLIC_IP=$(aws ec2 describe-instances \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --query "Reservations[0].Instances[0].PublicIpAddress" \
          --output text)

        if [ "$PUBLIC_IP" == "None" ] || [ -z "$PUBLIC_IP" ]; then
          echo "❌ Instância desligada ou sem IP público."
          exit 1
        fi

        echo "EC2_HOST=$PUBLIC_IP" >> $GITHUB_ENV
        echo "✅ IP detectado: $PUBLIC_IP"

    # ── 4. EMPACOTAR E ENVIAR PARA O S3 ─────────────────────────────────────
    # O runner faz upload para S3 e gera uma URL pré-assinada (válida 1h).
    # A EC2 vai baixar via curl — sem precisar de credenciais AWS no servidor.
    - name: Package Code and Upload to S3
      env:
        S3_BUCKET: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
      run: |
        if [ -z "$S3_BUCKET" ]; then
          echo "❌ Secret AWS_STORAGE_BUCKET_NAME não configurado!"
          exit 1
        fi
        if [ -z "${{ secrets.APP_DIR }}" ]; then
          echo "❌ Secret APP_DIR não configurado!"
          exit 1
        fi

        echo "📦 Empacotando código..."
        tar czf /tmp/app_deploy.tar.gz \
          --exclude='./.git' \
          --exclude='./venv' \
          --exclude='./.env' \
          --exclude='./db.sqlite3' \
          --exclude='./db.sqlite3.bak_*' \
          --exclude='./__pycache__' \
          --exclude='./*.pyc' \
          --exclude='./staticfiles' \
          .

        echo "☁️  Enviando para S3..."
        aws s3 cp /tmp/app_deploy.tar.gz \
          "s3://${S3_BUCKET}/deploy/app_deploy.tar.gz" \
          --no-progress

        echo "🔗 Gerando URL pré-assinada..."
        PRESIGNED_URL=$(aws s3 presign \
          "s3://${S3_BUCKET}/deploy/app_deploy.tar.gz" \
          --expires-in 3600)

        echo "PRESIGNED_URL=$PRESIGNED_URL" >> $GITHUB_ENV
        echo "✅ Pacote enviado ($(du -sh /tmp/app_deploy.tar.gz | cut -f1))"

    # ── 5. DEPLOY VIA SSM ────────────────────────────────────────────────────
    # SSM Run Command executa o script no servidor sem SSH nem chave.
    # É o mesmo mecanismo que você usa para acessar via console AWS.
    - name: Deploy via SSM
      env:
        PRESIGNED_URL: ${{ env.PRESIGNED_URL }}
        APP_DIR: ${{ secrets.APP_DIR }}
      run: |
        # Monta o script de deploy como string
        DEPLOY_SCRIPT=$(cat << SCRIPT
set -e

APP_DIR="${APP_DIR}"
VENV="\$APP_DIR/venv/bin"

echo ""
echo "════════════════════════════════════════"
echo "  STREAMING FLIX — DEPLOY \$(date '+%d/%m/%Y %H:%M:%S')"
echo "════════════════════════════════════════"

echo ""
echo "📥 [1/5] Baixando código via URL pré-assinada..."
curl -sL -o /tmp/app_deploy.tar.gz "${PRESIGNED_URL}"

echo ""
echo "📦 [2/5] Extraindo código em \$APP_DIR..."
mkdir -p "\$APP_DIR"
tar xzf /tmp/app_deploy.tar.gz -C "\$APP_DIR"
rm -f /tmp/app_deploy.tar.gz

echo ""
echo "📦 [3/5] Instalando dependências..."
"\$VENV/pip" install -r "\$APP_DIR/requirements.txt" --quiet

echo ""
echo "💾 [4/5] Backup do banco e migrations..."
cd "\$APP_DIR"
cp db.sqlite3 "db.sqlite3.bak_\$(date +%Y%m%d_%H%M%S)" 2>/dev/null || true
ls -t db.sqlite3.bak_* 2>/dev/null | tail -n +6 | xargs rm -f || true
"\$VENV/python" manage.py migrate --noinput

echo ""
echo "🔄 [5/5] Reiniciando Gunicorn..."
systemctl restart gunicorn
sleep 2
systemctl is-active --quiet gunicorn \
  && echo "✅ Gunicorn rodando." \
  || (echo "❌ Gunicorn falhou ao iniciar!" && exit 1)

echo ""
echo "════════════════════════════════════════"
echo "  ✅ DEPLOY CONCLUÍDO COM SUCESSO"
echo "════════════════════════════════════════"
SCRIPT
        )

        echo "🚀 Enviando comando via SSM..."
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Streaming Flix Deploy" \
          --parameters "$(jq -n --arg s "$DEPLOY_SCRIPT" '{"commands":[$s]}')" \
          --query "Command.CommandId" \
          --output text)

        echo "SSM Command ID: $COMMAND_ID"

        # Aguardar conclusão (polling a cada 10s, máx 5min)
        echo "⏳ Aguardando execução..."
        for i in $(seq 1 30); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StatusDetails" --output text 2>/dev/null || echo "Pending")

          echo "  Status [$i/30]: $STATUS"

          if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || \
                "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
            break
          fi
          sleep 10
        done

        # Exibir output do script
        RESULT=$(aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}")

        FINAL_STATUS=$(echo "$RESULT" | jq -r '.StatusDetails')
        OUTPUT=$(echo "$RESULT" | jq -r '.StandardOutputContent')
        STDERR=$(echo "$RESULT" | jq -r '.StandardErrorContent')

        echo ""
        echo "════ OUTPUT DO SERVIDOR ════"
        echo "$OUTPUT"

        if [ -n "$STDERR" ] && [ "$STDERR" != "null" ] && [ "$STDERR" != "" ]; then
          echo "════ STDERR ════"
          echo "$STDERR"
        fi

        if [ "$FINAL_STATUS" != "Success" ]; then
          echo "❌ Deploy falhou com status: $FINAL_STATUS"
          exit 1
        fi

        echo "✅ Deploy concluído com sucesso (Status: $FINAL_STATUS)"

    # ── 6. LIMPAR ARTEFATO DO S3 (SEMPRE) ───────────────────────────────────
    - name: Cleanup S3 Deploy Artifact
      if: always()
      env:
        S3_BUCKET: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
      run: |
        if [ -n "$S3_BUCKET" ]; then
          aws s3 rm "s3://${S3_BUCKET}/deploy/app_deploy.tar.gz" 2>/dev/null || true
          echo "🗑️  Artefato removido do S3."
        fi

    # ── 7. HEALTH CHECK ──────────────────────────────────────────────────────
    - name: Health Check
      run: |
        echo "⏳ Aguardando aplicação estabilizar..."
        sleep 5

        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-time 15 --location \
          "http://${{ env.EC2_HOST }}" || echo "000")

        echo "HTTP Response: $HTTP_CODE"

        if [[ "$HTTP_CODE" =~ ^(200|301|302)$ ]]; then
          echo "✅ Aplicação respondendo ($HTTP_CODE)"
        else
          echo "❌ Aplicação não respondeu como esperado (HTTP $HTTP_CODE)"
          exit 1
        fi
